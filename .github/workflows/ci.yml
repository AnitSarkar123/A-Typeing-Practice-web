name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    - name: Run CI tasks
      run: |
        if [ -f package.json ]; then
          npm install
          npm test || echo "No test specified"
        else
          echo "No package.json found, skipping tests"
        fi
